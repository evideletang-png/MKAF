<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connexion - Max Cafés</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-card" aria-labelledby="loginTitle">
        <img class="login-logo" src="/assets/max-cafes-logo-cropped.png" alt="Max Cafés" />
        <p class="eyebrow">Outil interne</p>
        <h1 id="loginTitle">Connexion sécurisée</h1>

        <form class="login-form" id="loginForm">
          <label>
            Identifiant
            <input id="username" name="username" autocomplete="username" required />
          </label>
          <label>
            Mot de passe
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </label>
          <p class="login-error" id="loginError" role="alert" hidden></p>
          <button class="primary" id="loginSubmit" type="submit">Se connecter</button>
        </form>
      </section>
    </main>

    <script>
      const form = document.querySelector("#loginForm");
      const usernameInput = document.querySelector("#username");
      const passwordInput = document.querySelector("#password");
      const errorBox = document.querySelector("#loginError");
      const submitButton = document.querySelector("#loginSubmit");
      const params = new URLSearchParams(window.location.search);
      const nextPath = params.get("next") || "/";

      function showError(message) {
        errorBox.textContent = message;
        errorBox.hidden = false;
      }

      async function checkConfiguration() {
        try {
          const response = await fetch("/api/session", {
            headers: { accept: "application/json" }
          });
          const payload = await response.json();
          if (!payload.authConfigured) {
            submitButton.disabled = true;
            showError("Authentification non configurée : ajoutez AUTH_PASSWORD ou AUTH_PASSWORD_HASH dans Railway.");
          }
        } catch {
          showError("Impossible de vérifier la configuration du serveur.");
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorBox.hidden = true;
        submitButton.disabled = true;

        try {
          const response = await fetch("/api/login", {
            method: "POST",
            headers: {
              accept: "application/json",
              "content-type": "application/json"
            },
            body: JSON.stringify({
              username: usernameInput.value,
              password: passwordInput.value,
              next: nextPath
            })
          });
          const payload = await response.json().catch(() => ({}));

          if (!response.ok) {
            showError(payload.message || "Connexion impossible.");
            submitButton.disabled = false;
            return;
          }

          window.location.assign(payload.redirectTo || "/");
        } catch {
          showError("Connexion impossible. Réessayez dans quelques instants.");
          submitButton.disabled = false;
        }
      });

      void checkConfiguration();
    </script>
  </body>
</html>
